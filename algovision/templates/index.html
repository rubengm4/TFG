{% extends "base.html" %}
{% load static %}

{% block title %}Algovision{% endblock %}

{% block content %}
<div class="container py-5 text-center">
  <h1 class="mb-3">Bienvenido a Algovision</h1>
  <p class="lead mb-5">Aplicación de gestión de algoritmos de IA</p>

  <div class="row justify-content-center g-3 mb-4">
    <div class="col-auto">
      <form method="post" action="{% url 'accounts:set_source' %}">
        {% csrf_token %}
        <input type="hidden" name="source" value="fv-analysis" />
        <button type="submit" class="btn btn-primary px-4">FV Analysis</button>
      </form>
    </div>
    <div class="col-auto">
      <form method="post" action="{% url 'accounts:set_source' %}">
        {% csrf_token %}
        <input type="hidden" name="source" value="example-project" />
        <button type="submit" class="btn btn-primary px-4">Example</button>
      </form>
    </div>
    <div class="col-auto">
      <form method="post" action="{% url 'accounts:set_source' %}">
        {% csrf_token %}
        <input type="hidden" name="source" value="enlace3" />
        <button type="submit" class="btn btn-primary px-4">Enlace 3</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
