{% extends "base.html" %} {% block title %}Eliminar usuario{% endblock %} {%
block content %}
<div class="flex flex-col items-center justify-center min-h-screen px-4 py-8">
  <div
    class="bg-red-100 p-8 rounded-xl shadow-md w-full max-w-md transition-all hover:shadow-red-300/50"
  >
    <h2 class="text-2xl font-bold text-red-700 mb-4">
      Eliminar usuario definitivamente
    </h2>
    <p class="mb-4 text-gray-700">
      ¿Seguro que quieres eliminar tu usuario? Esto también borrará todos tus
      archivos y ejecuciones asociados.
    </p>

    <form method="post" class="flex flex-col md:flex-row gap-2">
      {% csrf_token %}
      <a
        href="{% url 'accounts:manage_user' %}"
        class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 py-2 rounded-lg text-center shadow transition-all flex items-center justify-center gap-2"
      >
        <i class="fas fa-arrow-left"></i> No, volver
      </a>
      <button
        type="submit"
        class="flex-1 bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg shadow-md flex items-center justify-center gap-2 transition-all"
      >
        <i class="fas fa-trash-alt"></i> Sí, eliminar usuario
      </button>
    </form>
  </div>
</div>
{% endblock %}
