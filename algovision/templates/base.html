<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Algovision{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (compiled locally) -->
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="stylesheet" href="{% static 'css/csp-extra.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body class="flex h-screen bg-gray-100 overflow-hidden">

<!-- Sidebar -->
<nav id="sidebar" class="bg-gray-700 text-gray-100 w-64 flex-shrink-0 h-full fixed z-20 transform transition-transform duration-300">
    <div class="px-6 py-4 flex items-center">
        <a href="/dashboard">
            <img src="{% static 'images/hctlab.png' %}" alt="Algovision Logo" class="h-8 w-auto hover:opacity-80 transition-opacity">
        </a>
    </div>
    <hr class="border-gray-400 my-2">
    <ul class="flex flex-col gap-1 px-4">
        {% block sidebar_links %}{% endblock %}
    </ul>
</nav>

<!-- Main content -->
<div id="mainContent" class="relative flex-1 ml-64 transition-all p-6 overflow-auto">

    <!-- Sidebar Toggle Button -->
    <button id="sidebarToggle"
            class="fixed top-6 z-30
                bg-gradient-to-br from-gray-700 via-gray-800 to-black
                text-white px-4 py-2 rounded-xl
                shadow-md hover:shadow-green-400/30
                hover:scale-105 hover:brightness-110
                transition-all backdrop-blur-sm
                focus:outline-none">
        <i id="toggleIcon" class="fas fa-bars"></i>
    </button>


    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-semibold text-gray-800">{% block page_title %}{% endblock %}</h1>
        <div>
            {% block page_actions %}{% endblock %}
        </div>
    </div>

    <!-- Page content -->
    <div class="space-y-6">
        {% block content %}{% endblock %}
    </div>
</div>

<!-- Font Awesome -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
<script src="{% static 'js/base.js' %}" defer></script>
<script src="{% static 'js/table_utils.js' %}" defer></script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
