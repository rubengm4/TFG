<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Algovision{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="flex h-screen bg-gray-100 overflow-hidden">

<!-- Sidebar (Izquierda) -->
<nav id="sidebar" class="bg-gray-700 text-gray-100 w-64 flex-shrink-0 h-full fixed z-20 transform transition-transform duration-300">
    <div class="px-6 py-4 flex items-center">
        <a href="/dashboard">
            <img src="{% static 'images/hctlab.png' %}" alt="Algovision Logo" class="h-8 w-auto hover:opacity-80 transition-opacity">
        </a>
    </div>
    <hr class="border-gray-400 my-2">
    <ul class="flex flex-col gap-1 px-4">
        {% block sidebar_links %}
        <!-- Links por defecto -->
        {% endblock %}
    </ul>
</nav>


<!-- Contenido principal -->
<div id="mainContent" class="flex-1 ml-64 transition-all p-6 overflow-auto">
    <!-- Sidebar Toggle Button (fuera del sidebar, siempre visible) -->
    <button id="sidebarToggle"
            class="fixed top-5 left-72 z-30 
                bg-gradient-to-br from-gray-700 via-gray-800 to-black
                text-white px-4 py-2 rounded-xl 
                shadow-md hover:shadow-green-400/30 
                hover:scale-105 hover:brightness-110
                transition-all backdrop-blur-sm
                focus:outline-none">
        <i class="fas fa-bars text-lg"></i>
    </button>

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-semibold text-gray-800">{% block page_title %}{% endblock %}</h1>
        <div>
            {% block page_actions %}{% endblock %}
        </div>
    </div>

    <!-- Contenido de la página -->
    <div class="space-y-6">
        {% block content %}{% endblock %}
    </div>
</div>

<!-- Font Awesome -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>

<script>
    const toggleBtn = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');

    // Restore sidebar state
    if (localStorage.getItem('sidebarCollapsed') === 'true') {
        sidebar.classList.add('-translate-x-full');
        mainContent.classList.remove('ml-64');
        mainContent.classList.add('ml-0');
        toggleBtn.classList.add('left-4'); // Mover el toggle button a la izquierda cuando el sidebar esté oculto
        toggleBtn.classList.remove('left-72');
    }

    toggleBtn.addEventListener('click', () => {
        const collapsed = sidebar.classList.toggle('-translate-x-full');

        if (collapsed) {
            mainContent.classList.remove('ml-64');
            mainContent.classList.add('ml-0');
            toggleBtn.classList.add('left-4'); // Mover el toggle button a la izquierda cuando el sidebar esté oculto
            toggleBtn.classList.remove('left-72');
        } else {
            mainContent.classList.remove('ml-0');
            mainContent.classList.add('ml-64');
            toggleBtn.classList.remove('left-4'); // Mover el botón al lado del sidebar
            toggleBtn.classList.add('left-72');
        }

        localStorage.setItem('sidebarCollapsed', collapsed);
    });
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
