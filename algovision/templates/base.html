<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Algovision{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background-color: #343a40;
            padding-top: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar .nav-link {
            color: white;
        }

        .sidebar .nav-link:hover {
            background-color: #495057;
        }

        .main-content {
            margin-left: 200px;
            padding: 2rem;
            transition: margin-left 0.3s ease;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        #sidebarToggle {
            position: fixed;
            top: 1rem;
            left: 210px;
            z-index: 1100;
            background-color: #343a40;
            color: white;
            border: none;
            font-size: 1.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            transition: left 0.3s ease;
        }

        .sidebar.collapsed + #sidebarToggle {
            left: 1rem;
        }

        @media (min-width: 992px) {
            #sidebarToggle {
                font-size: 1.25rem;
                padding: 0.4rem 0.6rem;
                opacity: 0.7;
            }

            #sidebarToggle:hover {
                opacity: 1;
            }
        }

        .d-flex.gap-1 input.form-control {
            width: auto;
            flex-grow: 1;
        }        
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
    <a class="navbar-brand text-white px-3 mb-3" href="/" style="font-size: 1.5rem;">Algovision</a>
    <hr class="text-secondary my-2 mx-3">
    <ul class="nav flex-column px-2">
        {% block sidebar_links %}
        <!-- Default links, or empty -->
        {% endblock %}
    </ul>
</nav>


<!-- Toggle Button -->
<button id="sidebarToggle">&#9776;</button>

<!-- Main Content -->
<div class="main-content" id="mainContent">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const toggleBtn = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');

    // Restaurar el estado desde localStorage al cargar
    if (localStorage.getItem('sidebarCollapsed') === 'true') {
        sidebar.classList.add('collapsed');
        mainContent.classList.add('expanded');
    }

    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        mainContent.classList.toggle('expanded');

        // Guardar estado en localStorage
        const isCollapsed = sidebar.classList.contains('collapsed');
        localStorage.setItem('sidebarCollapsed', isCollapsed);
    });
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
