{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - {{ source|capfirst }}</title>
    <link rel="stylesheet" href="{% static 'css/homepage.css' %}" />
    <style>
      /* Simple styles for form */
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 50px;
      }
      .login-container {
        max-width: 400px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 6px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }
      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }
      form {
        display: flex;
        flex-direction: column;
      }
      input[type="text"],
      input[type="password"] {
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px;
        background: #007bff;
        border: none;
        color: white;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login for: {{ source|capfirst }}</h2>

      <form method="post" action="{% url 'custom_login' %}">
        {% csrf_token %} {% if form.errors %}
        <div style="color: red">
          <strong>Please correct the errors below:</strong>
        </div>
        {% endif %} {{ form.username.label_tag }} {{ form.username }} {{
        form.password.label_tag }} {{ form.password }}

        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
