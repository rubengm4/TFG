# First boot with an empty DB: set in algovision/.env to auto-create Django superuser:
#   DJANGO_SUPERUSER_USERNAME, DJANGO_SUPERUSER_EMAIL, DJANGO_SUPERUSER_PASSWORD
# REDIS_SSL=true only when using TLS (e.g. rediss://…).
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/algovision
    command: >
      sh -c "python manage.py migrate &&
             python manage.py bootstrap_initial_data &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 algovision.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - ./algovision/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: "2"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/\", timeout=5)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/algovision
    command: celery -A algovision worker -l info
    volumes:
      - .:/app
      - media_volume:/app/media
    env_file:
      - ./algovision/.env
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No mem_limit: resolving/installing TF+CUDA via pip can spike RAM; cgroup caps caused SIGKILL (137).
    cpus: "2"
    healthcheck:
      test:
        ["CMD-SHELL", "celery -A algovision inspect ping -t 10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6378:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: algovision
      MYSQL_USER: algovision
      MYSQL_PASSWORD: algovision
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mysql_data:
  static_volume:
  media_volume:
